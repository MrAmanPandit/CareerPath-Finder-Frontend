<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Primary SEO Meta Tags -->
    <title>Career Path Finder | The Best Career Guidance & Roadmap Platform</title>
    <meta name="title" content="Career Path Finder | Discover Your Perfect Career" />
    <meta name="description" content="Career Path Finder helps students explore personalized career options, step-by-step roadmaps, and course guidance. The #1 free career guidance platform." />
    <meta name="keywords" content="career path finder, career pathfinder, finding career paths, career guidance, career roadmap, career for students" />
    <meta name="author" content="CareerPath Finder Team" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <link rel="canonical" href="https://www.careerpathsfinder.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.careerpathsfinder.com/" />
    <meta property="og:title" content="CareerPath Finder | Discover Your Perfect Career Path" />
    <meta property="og:description" content="Explore personalized career roadmaps and course guidance based on your stream. Find your dream career with CareerPath Finder." />
    <meta property="og:image" content="https://www.careerpathsfinder.com/og-image.png" />
    <meta property="og:site_name" content="CareerPath Finder" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.careerpathsfinder.com/" />
    <meta name="twitter:title" content="CareerPath Finder | Discover Your Perfect Career Path" />
    <meta name="twitter:description" content="Explore personalized career roadmaps and course guidance based on your stream. Find your dream career with CareerPath Finder." />
    <meta name="twitter:image" content="https://www.careerpathsfinder.com/og-image.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CareerPath Finder",
      "url": "https://www.careerpathsfinder.com",
      "logo": "https://www.careerpathsfinder.com/favicon.ico",
      "description": "CareerPath Finder is a personalized career guidance platform helping students discover the right career path based on their stream.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "url": "https://www.careerpathsfinder.com/contact"
      }
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CareerPath Finder",
      "url": "https://www.careerpathsfinder.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.careerpathsfinder.com/career/roadmap/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
