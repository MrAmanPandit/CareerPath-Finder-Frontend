<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareerPath Finder</title>
    <style>
        /* Base styles and colors to match the main website */
        :root {
            --primary-bg: #111827; /* Dark background */
            --accent-color: #4f46e5; /* Indigo purple */
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Center the login card on the screen */
        body {
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Takes up the full height of the browser window */
        }

        /* The white login box */
        .login-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px; /* Keeps it from getting too wide on large screens */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .login-card h2 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        /* Styling the form inputs */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            color: var(--text-dark);
            transition: border-color 0.3s ease;
        }

        /* Adds a purple border when you click inside the text box */
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* The Login Button */
        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background-color: #4338ca; /* Slightly darker purple on hover */
        }

        /* The 'Sign Up' link at the bottom */
        .signup-text {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .signup-text a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login</h2>
        
        <form action="#" method="POST">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>

        <p class="signup-text">
            Don't have an account? <a href="#">Sign Up</a>
        </p>
    </div>

</body>
</html>
